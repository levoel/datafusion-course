# DataFusion Real-World Patterns Lab
# Среда для экспериментов с мультитенантностью и аналитическими API

services:
  lab:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: datafusion-real-world-patterns
    volumes:
      - ./exercises:/app/exercises
      - ./data:/app/data
    working_dir: /app
    stdin_open: true
    tty: true
    command: bash
