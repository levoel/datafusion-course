# DataFusion Performance Tuning Lab
# Среда для экспериментов с конфигурацией и партиционированием

services:
  lab:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: datafusion-performance-tuning
    volumes:
      - ./exercises:/app/exercises
      - ./data:/app/data
    working_dir: /app
    stdin_open: true
    tty: true
    command: bash
