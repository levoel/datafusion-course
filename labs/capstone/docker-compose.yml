# DataFusion Capstone Lab
# Минимальная среда: Python + DataFusion + тестовые данные

services:
  lab:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: datafusion-capstone
    volumes:
      - ./exercises:/app/exercises
      - ./data:/app/data
    working_dir: /app
    stdin_open: true
    tty: true
    command: bash
